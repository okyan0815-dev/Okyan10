<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>British Accent Tutor - Web App</title>
    
    <!-- エラー監視機能 -->
    <script>
        window.addEventListener('error', function(event) {
            document.body.innerHTML = '<div style="padding:20px; font-family:sans-serif; color:#b91c1c; background:#fef2f2; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">' +
                '<h2 style="font-weight:bold; font-size:24px; margin-bottom:10px;">ごめんなさい！システムエラーが発生しました。</h2>' +
                '<p style="margin-bottom:20px;">以下のエラー内容をAIに教えてください：</p>' +
                '<div style="background:#fff; padding:20px; border:1px solid #fca5a5; border-radius:12px; text-align:left; width:100%; max-width:500px; margin-bottom:20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">' + 
                '<div style="font-family:monospace; color:#ef4444; margin-bottom:10px;">' + event.message + '</div>' +
                '<div style="font-size:14px; color:#64748b;">行番号: ' + event.lineno + '</div>' +
                '</div>' +
                '<button onclick="localStorage.clear(); window.location.reload();" style="background:#ef4444; color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">データをリセットして最初からやり直す</button>' +
                '</div>';
        });
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; color: #292524; }
        .serif { font-family: 'Playfair Display', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f5f5f4; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div style="border: 4px solid #e2e8f0; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: #64748b; font-weight: bold; font-family: sans-serif;">アプリを起動中...</p>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useMemo, useEffect } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>,
                history: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>,
                words: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></g>,
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>,
                eye: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
                x: <path fill="none" stroke="currentColor" strokeWidth="2" d="M18 6 6 18M6 6l12 12"/>,
                play: <path d="m5 3 14 9-14 9V3z"/>,
                mic: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></g>,
                square: <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>,
                headphones: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></g>,
                trash: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>,
                loader: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></g>,
                languages: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></g>,
                chevronDown: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="m6 9 6 6 6-6"/>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>,
                key: <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            };
            return <svg viewBox="0 0 24 24" className={className} fill="currentColor" xmlns="http://www.w3.org/2000/svg">{icons[name] || null}</svg>;
        };

        const App = () => {
            const [apiKey, setApiKey] = useState(() => {
                try { return localStorage.getItem('gemini_api_key') || ''; } catch (e) { return ''; }
            });
            const [showApiSetup, setShowApiSetup] = useState(() => {
                try { return !localStorage.getItem('gemini_api_key'); } catch (e) { return true; }
            });
            const [appReady, setAppReady] = useState(false);

            const [activeTab, setActiveTab] = useState('tutor');
            const [isEditMode, setIsEditMode] = useState(false);
            const [text, setText] = useState("I was waiting for the train at Victoria Station when the heavens opened.\n\nIt's quite typical for London weather, isn't it?");
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null); 
            
            const [selectedVoice, setSelectedVoice] = useState('Kore');
            const [error, setError] = useState(null);
            
            const [isRecording, setIsRecording] = useState(false);
            const [recordedBlob, setRecordedBlob] = useState(null);
            const [recordedUrl, setRecordedUrl] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [isReadingFeedback, setIsReadingFeedback] = useState(false);
            const [isSuggesting, setIsSuggesting] = useState(false);
            
            const [fullTranslation, setFullTranslation] = useState(null);
            const [isTranslating, setIsTranslating] = useState(false);
            const [showTranslation, setShowTranslation] = useState(false);
            
            const [selectedWord, setSelectedWord] = useState(null);
            const [isFetchingDetails, setIsFetchingDetails] = useState(false);
            const [wordDetails, setWordDetails] = useState(null);

            const mediaRecorderRef = useRef(null);
            const chunksRef = useRef([]);
            const audioRef = useRef(null);
            const feedbackAudioRef = useRef(null);

            const voices = [
                { name: 'Kore', description: 'Firm/しっかりした' },
                { name: 'Zephyr', description: 'Bright/明るい' },
                { name: 'Charon', description: 'Informative/落ち着いた' },
                { name: 'Puck', description: 'Upbeat/陽気な' },
                { name: 'Fenrir', description: 'Excitable/元気な' },
                { name: 'Aoede', description: 'Breezy/軽やか' }
            ];

            const [history, setHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('bt_history');
                    if (!saved) return [];
                    const parsed = JSON.parse(saved);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) { return []; }
            });

            const [wordBank, setWordBank] = useState(() => {
                try {
                    const saved = localStorage.getItem('bt_wordbank');
                    if (!saved) return [];
                    const parsed = JSON.parse(saved);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) { return []; }
            });

            useEffect(() => { try { localStorage.setItem('bt_history', JSON.stringify(history)); } catch (e) {} }, [history]);
            useEffect(() => { try { localStorage.setItem('bt_wordbank', JSON.stringify(wordBank)); } catch (e) {} }, [wordBank]);

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';
                setAppReady(true);
            }, []);

            useEffect(() => { setFullTranslation(null); setShowTranslation(false); }, [text]);

            const handleSaveApiKey = () => {
                if (apiKey && apiKey.trim().length > 10) {
                    try {
                        localStorage.setItem('gemini_api_key', apiKey.trim());
                        setShowApiSetup(false);
                        setError(null);
                    } catch (e) { setError("設定の保存に失敗しました。"); }
                } else { setError("正しいAPIキーを入力してください。"); }
            };

            const resetApiKey = () => {
                try { localStorage.removeItem('gemini_api_key'); } catch (e) {}
                setApiKey(''); setShowApiSetup(true);
            };

            const callGemini = async (payload, endpoint = "generateContent", model = "gemini-2.5-flash") => {
                const currentKey = apiKey.trim();
                if (!currentKey) { setShowApiSetup(true); throw new Error("APIキーが設定されていません。"); }
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:${endpoint}?key=${currentKey}`;
                try {
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) {
                        if (res.status === 403 || res.status === 400) throw new Error("APIキーが無効、または制限に達しています。新しいキーを取得してください。");
                        const err = await res.json();
                        throw new Error(err.error?.message || '通信に失敗しました。');
                    }
                    return await res.json();
                } catch (e) { throw new Error(e.message || "ネットワークエラーが発生しました。"); }
            };

            const pcmToWav = (binaryString) => {
                const pcmData = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) pcmData[i] = binaryString.charCodeAt(i);
                const buffer = new ArrayBuffer(44 + pcmData.length);
                const view = new DataView(buffer);
                view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + pcmData.length, true);
                view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true); view.setUint32(28, 48000, true); view.setUint16(32, 2, true);
                view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false); view.setUint32(40, pcmData.length, true);
                for (let i = 0; i < pcmData.length; i++) view.setUint8(44 + i, pcmData[i]);
                return buffer;
            };

            const generateSpeech = async (textToSpeak, isFeedback = false) => {
                if (!textToSpeak.trim()) return;
                if (isFeedback) setIsReadingFeedback(true); else setIsGenerating(true);
                setError(null);
                try {
                    const prompt = isFeedback ? `Read this feedback naturally in Japanese: ${textToSpeak}` : `Say this in a clear British accent: ${textToSpeak}`;
                    const res = await callGemini({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: selectedVoice } } } }
                    }, "generateContent", "gemini-2.5-flash-preview-tts");

                    const audioData = res.candidates[0].content.parts.find(p => p.inlineData).inlineData.data;
                    const url = URL.createObjectURL(new Blob([pcmToWav(atob(audioData))], { type: 'audio/wav' }));
                    
                    if (isFeedback) { 
                        if (feedbackAudioRef.current) { feedbackAudioRef.current.src = url; feedbackAudioRef.current.play(); } 
                    } else { 
                        setAudioUrl(url); 
                        setTimeout(() => { if(audioRef.current) audioRef.current.play(); }, 100);
                    }
                } catch (err) { setError(err.message || "音声の生成に失敗しました。");
                } finally { if (isFeedback) setIsReadingFeedback(false); else setIsGenerating(false); }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mr = new MediaRecorder(stream);
                    mediaRecorderRef.current = mr; chunksRef.current = [];
                    mr.ondataavailable = e => chunksRef.current.push(e.data);
                    mr.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        setRecordedBlob(blob); setRecordedUrl(URL.createObjectURL(blob));
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mr.start(); setIsRecording(true); setFeedback(null); setError(null);
                } catch (e) { setError("マイクへのアクセスを許可してください。"); }
            };
            const stopRecording = () => { if (mediaRecorderRef.current && isRecording) { mediaRecorderRef.current.stop(); setIsRecording(false); } };

            const handleSuggest = async (cat) => {
                setIsSuggesting(true); setIsEditMode(false); setError(null);
                try {
                    let prompt = ""; const randomSeed = Math.random().toString(36).substring(7);
                    if (cat === "Short Story") {
                        const themes = ["waiting for a delayed train at King's Cross station", "having a posh afternoon tea", "complaining politely about sudden rain", "a slight misunderstanding in a pub"];
                        const t = themes[Math.floor(Math.random() * themes.length)];
                        prompt = `Generate a unique short story in British English (CEFR B2/C1 level) containing a dialogue between two characters. Theme: ${t}. [Seed: ${randomSeed}] Use line breaks. Output ONLY the story text.`;
                    } else { prompt = `Generate a completely unique, natural British English sentence about ${cat}. [Seed: ${randomSeed}] Output ONLY the sentence.`; }
                    const res = await callGemini({ contents: [{ parts: [{ text: prompt }] }] });
                    setText(res.candidates[0].content.parts[0].text.replace(/"/g, '').trim());
                } catch (e) { setError(e.message); } finally { setIsSuggesting(false); }
            };

            const handleTranslate = async () => {
                if (showTranslation && fullTranslation) { setShowTranslation(false); return; }
                if (fullTranslation) { setShowTranslation(true); return; }
                if (!text.trim()) return;
                setIsTranslating(true); setError(null);
                try {
                    const res = await callGemini({ contents: [{ parts: [{ text: `Translate the following English text into natural Japanese:\n\n"${text}"\n\nOutput ONLY the Japanese translation.` }] }] });
                    setFullTranslation(res.candidates[0].content.parts[0].text.trim()); setShowTranslation(true);
                } catch (e) { setError(e.message); } finally { setIsTranslating(false); }
            };

            const handleWordClick = async (word) => {
                const clean = word.replace(/[.,/#!$%^&*;:{}=\-_`~()"]/g,"");
                if (!clean) return;
                setSelectedWord(clean); setIsFetchingDetails(true); setWordDetails(null); setError(null);
                try {
                    const res = await callGemini({ 
                        contents: [{ parts: [{ text: `Analyze the word: "${clean}". Return JSON format exactly like this: {"ipa":"(UK IPA)","pos":"(Part of Speech in Japanese)","meaning":"(Japanese meaning)","explanation":"(Brief nuance/usage in Japanese)"}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    });
                    setWordDetails(JSON.parse(res.candidates[0].content.parts[0].text));
                } catch (e) { setWordDetails({ ipa: "-", pos: "-", meaning: "エラー", explanation: "取得できませんでした" }); } finally { setIsFetchingDetails(false); }
            };

            // 単語を手動で追加する関数
            const handleAddWordToBank = (word, details) => {
                if (!word || !details) return;
                const newWord = {
                    id: Date.now(),
                    word: word,
                    level: "My Word", // 手動登録であることを示すラベル
                    ipa: details.ipa || "",
                    meaning_ja: details.meaning || ""
                };
                setWordBank(prev => [newWord, ...prev]);
                setSelectedWord(null); // 登録後に辞書モーダルを閉じる
            };

            const analyze = async () => {
                if (!recordedBlob) return;
                setIsAnalyzing(true); setError(null);
                const reader = new FileReader(); reader.readAsDataURL(recordedBlob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const res = await callGemini({
                            contents: [{ parts: [ { text: `Analyze pronunciation for: "${text}". Give feedback in Japanese with headers 【総評】【良かった点】【改善点】. Focus on British vowels and word linking.` }, { inlineData: { mimeType: "audio/webm", data: base64 } } ] }]
                        });
                        const fb = res.candidates[0].content.parts[0].text; setFeedback(fb);
                        setHistory(prev => [{ id: Date.now(), text, feedback: fb, timestamp: new Date().toISOString() }, ...prev]);
                        
                        try {
                            const vRes = await callGemini({ 
                                contents: [{ parts: [{ text: `List B2+ vocabulary words in "${text}". Return a JSON array: [{"word": "...", "level": "...", "ipa": "...", "meaning_ja": "..."}]` }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            });
                            const vocabs = JSON.parse(vRes.candidates[0].content.parts[0].text);
                            setWordBank(prev => {
                                const newWords = vocabs.map((v, i) => ({ id: Date.now() + i, ...v }));
                                return [...newWords, ...prev];
                            });
                        } catch(ve) {}
                    } catch (err) { setError(err.message || "分析に失敗しました。"); } finally { setIsAnalyzing(false); }
                };
            };

            const words = useMemo(() => (text || '').split(/(\s+)/), [text]);

            if (!appReady) return null;

            if (showApiSetup) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                        <div className="absolute top-[20%] right-[-10%] w-72 h-72 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
                        
                        <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-200 relative z-10">
                            <div className="flex justify-center mb-6 text-indigo-600"><Icon name="key" className="w-16 h-16" /></div>
                            <h2 className="text-2xl font-black mb-2 text-center text-slate-800 tracking-tight serif italic">Welcome</h2>
                            <p className="text-sm text-slate-600 mb-6 text-center leading-relaxed font-medium">
                                アプリを使用するには、Google AI Studioで取得したAPIキーを入力してください。<br/>
                                <span className="text-xs text-rose-500 block mt-2">※キーは安全なローカルストレージにのみ保存されます。</span>
                            </p>
                            {error && <div className="text-xs text-rose-600 bg-rose-50 p-3 rounded-lg mb-4 text-center font-bold">{error}</div>}
                            <input 
                                type="password" placeholder="AIzaSy..." 
                                className="w-full p-4 mb-4 border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:bg-indigo-50 transition-colors font-mono tracking-wider"
                                onChange={(e) => setApiKey(e.target.value)} value={apiKey} onKeyPress={(e) => e.key === 'Enter' && handleSaveApiKey()}
                            />
                            <button onClick={handleSaveApiKey} className="w-full py-4 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                                SAVE & START
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center pb-24 w-full">
                    <div className="max-w-3xl w-full space-y-6">
                        
                        <div className="flex gap-2">
                            <div className="flex flex-1 bg-white p-1 rounded-2xl shadow-sm border border-stone-200">
                                {['tutor', 'history', 'wordbank'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${activeTab === t ? 'bg-indigo-600 text-white shadow-md' : 'text-stone-500 hover:bg-stone-50'}`}>
                                        <Icon name={t === 'tutor' ? 'dashboard' : t === 'history' ? 'history' : 'words'} />
                                        <span className="capitalize ml-1 hidden sm:inline">{t === 'wordbank' ? 'Words' : t}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={resetApiKey} className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200 text-stone-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors" title="APIキーを再設定する">
                                <Icon name="settings" className="w-5 h-5" />
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium flex justify-between items-start animate-in fade-in">
                                <div><span className="font-bold">エラー: </span><span>{error}</span></div>
                                <button onClick={() => setError(null)} className="p-1"><Icon name="x" className="w-4 h-4" /></button>
                            </div>
                        )}

                        {activeTab === 'tutor' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-white rounded-3xl shadow-xl border border-stone-200 overflow-hidden">
                                    <div className="bg-gradient-to-br from-indigo-900 to-blue-800 p-8 text-white relative">
                                        <h1 className="text-3xl font-black italic uppercase serif tracking-tight">British Accent Tutor</h1>
                                        <div className="absolute top-6 right-6 opacity-20"><Icon name="sparkles" className="w-12 h-12" /></div>
                                    </div>
                                    <div className="p-6 space-y-6">
                                        <div className="flex justify-between items-center px-1">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-stone-400">Quick Challenges</span>
                                            <button onClick={() => setIsEditMode(!isEditMode)} className="text-[10px] font-bold uppercase tracking-widest text-indigo-600 hover:underline flex items-center gap-1">
                                                <Icon name={isEditMode ? "eye" : "edit"} className="w-3 h-3 mr-1" /> {isEditMode ? "Analyze Mode" : "Edit Text"}
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-5 gap-2">
                                            {['Tea Time', 'Weather', 'Pub Chat', 'Polite', 'Short Story'].map(cat => (
                                                <button key={cat} onClick={() => handleSuggest(cat)} className="p-2 bg-stone-50 rounded-xl border border-stone-100 text-[9px] font-black uppercase text-indigo-600 hover:bg-indigo-50 transition-colors" disabled={isSuggesting || isGenerating || isTranslating}>
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        <div className="relative group">
                                            {isSuggesting ? (
                                                <div className="w-full min-h-[160px] p-6 bg-stone-50 border-2 border-stone-100 rounded-2xl flex flex-col items-center justify-center text-stone-400">
                                                    <Icon name="loader" className="w-8 h-8 animate-spin mb-3 text-indigo-400" />
                                                    <span className="text-xs font-bold tracking-widest uppercase text-indigo-400">Generating New Text...</span>
                                                </div>
                                            ) : isEditMode ? (
                                                <textarea className="w-full min-h-[160px] p-6 bg-stone-50 border-2 border-indigo-200 rounded-2xl text-xl font-medium outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all leading-relaxed" value={text} onChange={e => setText(e.target.value)} />
                                            ) : (
                                                <div className="w-full min-h-[160px] p-6 bg-stone-50 border-2 border-stone-100 rounded-2xl text-xl font-medium overflow-y-auto custom-scrollbar max-h-[400px]">
                                                    {text.split('\n').map((line, lineIndex) => (
                                                        <p key={lineIndex} className="mb-4 last:mb-0 leading-relaxed">
                                                            {line.split(/(\s+)/).map((w, wIndex) => {
                                                                if (!w.trim()) return <span key={wIndex}>{w}</span>;
                                                                return (
                                                                    <span key={wIndex} onClick={() => handleWordClick(w)} className="cursor-pointer hover:bg-indigo-200 hover:text-indigo-900 rounded transition-colors inline-block">{w}</span>
                                                                );
                                                            })}
                                                        </p>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {showTranslation && fullTranslation && !isEditMode && (
                                            <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-3xl text-slate-800 text-sm leading-relaxed animate-in slide-in-from-top-2 shadow-inner">
                                                <div className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-3 flex items-center gap-1"><Icon name="languages" className="w-3 h-3" /> Japanese Translation</div>
                                                {fullTranslation.split('\n').map((line, i) => <p key={i} className="mb-2 last:mb-0 font-medium">{line}</p>)}
                                            </div>
                                        )}

                                        {selectedWord && !isEditMode && (
                                            <div className="p-6 bg-indigo-950 text-white rounded-3xl shadow-2xl relative border border-indigo-500/30 animate-in zoom-in-95">
                                                <div className="flex justify-between mb-4">
                                                    <div><span className="text-[10px] uppercase text-indigo-400 font-black tracking-widest">Dictionary</span><h2 className="text-3xl font-black">{selectedWord}</h2></div>
                                                    <button onClick={() => setSelectedWord(null)} className="p-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                                                </div>
                                                {isFetchingDetails ? <p className="animate-pulse flex items-center"><Icon name="loader" className="animate-spin mr-2"/>AI取得中...</p> : wordDetails && (
                                                    <div className="space-y-4">
                                                        <div className="flex gap-2">
                                                            <span className="px-3 py-1 bg-white/10 rounded-lg font-mono text-xl">{wordDetails.ipa}</span>
                                                            <span className="px-2 py-1 bg-amber-500 text-black text-[10px] font-black rounded uppercase flex items-center">{wordDetails.pos}</span>
                                                        </div>
                                                        <div className="bg-white/5 p-4 rounded-2xl shadow-inner border border-white/5">
                                                            <p className="font-bold text-lg mb-1">{wordDetails.meaning}</p><p className="text-sm opacity-80 italic leading-relaxed">{wordDetails.explanation}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => handleAddWordToBank(selectedWord, wordDetails)}
                                                            className="w-full py-3 mt-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-colors border border-indigo-400"
                                                        >
                                                            <Icon name="words" /> 単語帳に登録する
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="flex flex-col sm:flex-row gap-3">
                                            {!isEditMode && (
                                                <button onClick={handleTranslate} disabled={isTranslating || isSuggesting} className="flex-1 py-4 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-50 hover:text-indigo-600 active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                                                    {isTranslating ? <Icon name="loader" className="animate-spin" /> : <Icon name="languages" />}
                                                    {showTranslation ? "HIDE TRANSLATION" : "TRANSLATE"}
                                                </button>
                                            )}
                                            <div className="flex-1 relative">
                                                <select value={selectedVoice} onChange={e => setSelectedVoice(e.target.value)} className="w-full bg-slate-100 p-4 rounded-xl font-bold appearance-none outline-none shadow-inner h-full text-sm">
                                                    {voices.map(v => <option key={v.name} value={v.name}>{v.name} ({v.description})</option>)}
                                                </select>
                                                <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"><Icon name="chevronDown" className="w-4 h-4 text-slate-400" /></div>
                                            </div>
                                            <button onClick={() => generateSpeech(text)} disabled={isGenerating || isSuggesting || !text.trim()} className="flex-[1.5] py-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                                {isGenerating ? <Icon name="loader" className="animate-spin" /> : <Icon name="play" />} LISTEN (UK Accent)
                                            </button>
                                        </div>
                                        
                                        {audioUrl && (
                                            <div className="bg-indigo-50 p-2 rounded-xl border border-indigo-100 mt-4">
                                                <audio ref={audioRef} src={audioUrl} controls className="w-full h-8" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-3xl shadow-xl border border-stone-200 p-8 space-y-6 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-10 opacity-5 pointer-events-none"><Icon name="mic" className="w-32 h-32 text-rose-500" /></div>
                                    <div className="flex items-center gap-3 border-b border-stone-100 pb-4 relative z-10"><Icon name="mic" className="text-rose-500 w-6 h-6" /><h2 className="text-xl font-bold">Voice Practice</h2></div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
                                        <button onClick={isRecording ? stopRecording : startRecording} disabled={isSuggesting || isAnalyzing} className={`py-5 rounded-2xl font-black text-lg shadow-lg flex items-center justify-center gap-3 transition-all ${(isSuggesting || isAnalyzing) ? 'bg-stone-100 text-stone-400 cursor-not-allowed' : isRecording ? 'bg-stone-900 text-white animate-pulse' : 'bg-rose-50 text-rose-600 hover:bg-rose-100 shadow-rose-100'}`}>
                                            {isRecording ? <Icon name="square" /> : <Icon name="mic" />} {isRecording ? 'STOP' : 'RECORD'}
                                        </button>
                                        <button onClick={analyze} disabled={!recordedBlob || isAnalyzing || isRecording || isSuggesting} className={`py-5 rounded-2xl font-black text-lg shadow-lg flex items-center justify-center gap-3 transition-all ${(!recordedBlob || isAnalyzing || isRecording || isSuggesting) ? 'bg-stone-100 text-stone-400 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-700 active:scale-95 shadow-emerald-200'}`}>
                                            {isAnalyzing ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />} ANALYZE
                                        </button>
                                    </div>
                                    {recordedUrl && (
                                        <div className="flex items-center gap-4 bg-stone-50 p-3 rounded-xl border border-stone-200 relative z-10">
                                            <div className="text-[10px] font-bold text-stone-400 uppercase tracking-widest rotate-90 origin-left translate-x-1">Your Voice</div>
                                            <audio src={recordedUrl} controls className="flex-1 h-8" />
                                        </div>
                                    )}
                                    {feedback && (
                                        <div className="p-6 bg-amber-50 rounded-3xl border border-amber-100 space-y-4 shadow-inner relative animate-in fade-in z-10">
                                            <div className="flex justify-between items-center border-b border-amber-200 pb-2">
                                                <span className="text-[10px] font-black uppercase text-amber-800 tracking-widest flex items-center gap-1"><Icon name="sparkles" className="w-3 h-3" />AI Tutor</span>
                                                <button onClick={() => generateSpeech(feedback, true)} disabled={isReadingFeedback} className="p-2 bg-amber-200 text-amber-800 rounded-lg hover:bg-amber-300">
                                                    {isReadingFeedback ? <Icon name="loader" className="animate-spin" /> : <Icon name="headphones" />}
                                                </button>
                                            </div>
                                            <p className="text-stone-800 text-sm italic whitespace-pre-wrap leading-relaxed font-medium">{feedback}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-3xl shadow-xl border border-stone-200 p-8 space-y-6 animate-in slide-in-from-bottom-4">
                                <div className="flex items-center justify-between border-b border-stone-100 pb-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="history" className="w-6 h-6 text-indigo-600" /> Session History</h2>
                                    <span className="bg-stone-50 px-3 py-1 rounded-full text-xs font-bold text-stone-400 uppercase">{history.length} Sessions</span>
                                </div>
                                <div className="space-y-6 max-h-[70vh] overflow-y-auto pr-3 custom-scrollbar">
                                    {history.length === 0 ? <p className="text-center py-20 text-stone-300 italic font-medium">練習の記録はここに表示されます。</p> : history.map(h => (
                                        <div key={h.id} className="p-6 bg-stone-50 rounded-2xl border border-stone-100 relative group hover:border-indigo-200 transition-colors">
                                            <button onClick={() => setHistory(history.filter(item => item.id !== h.id))} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-stone-300 hover:text-rose-500 transition-all"><Icon name="trash" /></button>
                                            <span className="text-[10px] text-stone-400 font-black tracking-widest">{h.timestamp ? new Date(h.timestamp).toLocaleString() : 'Just now'}</span>
                                            <div className="text-lg font-bold text-stone-900 my-3 leading-snug whitespace-pre-wrap">"{h.text}"</div>
                                            <div className="bg-white p-5 rounded-xl border border-stone-200 text-sm italic whitespace-pre-wrap leading-relaxed shadow-sm text-stone-700 relative">{h.feedback}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'wordbank' && (
                            <div className="bg-white rounded-3xl shadow-xl border border-stone-200 p-8 space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="flex items-center justify-between border-b border-stone-100 pb-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="words" className="w-6 h-6 text-indigo-600" /> Vocabulary Bank</h2>
                                    <span className="bg-indigo-50 px-3 py-1 rounded-full text-xs font-black text-indigo-600 uppercase">{wordBank.length} Words</span>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                                    {wordBank.length === 0 ? <p className="col-span-2 text-center py-20 text-stone-300 italic font-medium">練習中にB2レベル以上の単語が自動抽出されます。<br/>または辞書から手動で登録できます。</p> : wordBank.map(v => (
                                        <div key={v.id} className="p-5 bg-stone-50 rounded-2xl border border-stone-100 group relative hover:shadow-lg transition-all border-l-4 border-l-indigo-600">
                                            <button onClick={() => setWordBank(wordBank.filter(item => item.id !== v.id))} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-stone-300 hover:text-rose-500 transition-all"><Icon name="trash" /></button>
                                            <span className="text-xl font-black text-indigo-950 block tracking-tight mb-1">{v.word}</span>
                                            <span className="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded text-[9px] font-black uppercase tracking-widest">{v.level}</span>
                                            <div className="text-[11px] font-mono text-indigo-400 mt-3 mb-1 bg-white border border-stone-100 px-2 py-1 rounded inline-block shadow-sm">{v.ipa}</div>
                                            <p className="text-sm text-stone-700 font-medium leading-relaxed mt-2">{v.meaning_ja}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
